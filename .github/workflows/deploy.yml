name: Deploy Chirp Backend

on:
  push:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  JAR_NAME: app-0.0.1-SNAPSHOT.jar
  LOCAL_JAR_PATH: app/build/libs/app-0.0.1-SNAPSHOT.jar
  REMOTE_JAR_DIR: /opt/chirp
  REMOTE_SERVICE: chirp.service
  FIREBASE_PATH: app/src/main/resources/firebase-credentials/chirp-firebase-adminsdk.json

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa_deploy
          chmod 600 ~/.ssh/id_rsa_deploy
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create Firebase credentials file
        run: |
          mkdir -p $(dirname "$FIREBASE_PATH")
          echo "${{ secrets.FIREBASE_CREDENTIALS_BASE64 }}" | base64 -d > "$FIREBASE_PATH"

      - name: Build JAR
        run: |
          ./gradlew :app:bootJar

      - name: Verify JAR exists
        run: |
          if [ ! -f "$LOCAL_JAR_PATH" ]; then
            echo "ERROR: $LOCAL_JAR_PATH not found!"
            exit 1
          fi
          echo "JAR ready: $(ls -lh $LOCAL_JAR_PATH)"

      - name: Deploy JAR to Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          rsync -avz -e "ssh -i ~/.ssh/id_rsa_deploy" \
            "$LOCAL_JAR_PATH" "admin@$SERVER_HOST:$REMOTE_JAR_DIR/$JAR_NAME"
        
          ssh -i ~/.ssh/id_rsa_deploy "admin@$SERVER_HOST" << EOF
            mv $REMOTE_JAR_DIR/$JAR_NAME $REMOTE_JAR_DIR/chirp.jar
            sudo systemctl restart $REMOTE_SERVICE
          EOF